{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="card" style="max-width: 460px; margin: 30px auto;">
    <h1 style="margin-top: 0;">Sign In</h1>
    <p class="muted">Use your existing CRM credentials.</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/auth/login">
        {{ csrf_input(request) }}
        <input type="hidden" name="next" value="{{ next }}">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required value="{{ email }}">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <label for="tenant_slug">Tenant Slug (optional)</label>
        <input id="tenant_slug" name="tenant_slug" type="text" value="{{ tenant_slug }}" placeholder="tenant-slug">

        <button type="submit">Login</button>
    </form>
</div>
{% endblock %}
