{% extends "base.html" %}

{% block content %}
<section class="card app-shell">
    <div class="app-head">
        <h1 style="margin: 0;">CRM Panel</h1>
        <p class="muted" style="margin: 6px 0 0 0;">Client operations workspace.</p>
    </div>

    <nav class="tabs">
        <a href="/app/clients" class="tab {% if request.url.path == '/app/clients' %}active{% endif %}">Clients</a>
        <a href="/app/orders" class="tab {% if request.url.path == '/app/orders' %}active{% endif %}">Orders</a>
        <a href="/app/employees" class="tab {% if request.url.path == '/app/employees' %}active{% endif %}">Employees</a>
    </nav>

    {% if page_error %}
        <div class="error" style="margin: 12px 0 0 0;">{{ page_error }}</div>
    {% endif %}

    <div class="app-content">
        {% block app_content %}{% endblock %}
    </div>
</section>

<style>
.app-head { margin-bottom: 12px; }
.tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
}
.tab {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 12px;
    text-decoration: none;
    color: var(--text);
    background: #fff;
    font-size: 14px;
}
.tab.active {
    background: #eaf2ff;
    border-color: #bfd7ff;
    font-weight: 700;
}
.toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: end;
    margin-bottom: 12px;
}
.toolbar input,
.toolbar select {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px;
    font-size: 14px;
}
.table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
}
.data-table {
    width: 100%;
    min-width: 760px;
    border-collapse: collapse;
}
.data-table th,
.data-table td {
    padding: 10px 12px;
    border-bottom: 1px solid #edf0f5;
    text-align: left;
    vertical-align: top;
    font-size: 14px;
}
.data-table th {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    background: #f9fbff;
}
.data-table tr:last-child td { border-bottom: 0; }
.actions {
    display: inline-flex;
    gap: 8px;
    flex-wrap: wrap;
}
.action-link {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 9px;
    text-decoration: none;
    color: var(--text);
    background: #fff;
    font-size: 13px;
}
.action-danger {
    border-color: #fecaca;
    color: #991b1b;
    background: #fff5f5;
}
.inline-form { display: inline; }
.pagination {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    gap: 10px;
    flex-wrap: wrap;
}
.pager-actions {
    display: flex;
    gap: 8px;
}
.pager-link,
.pager-disabled {
    display: inline-block;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    text-decoration: none;
}
.pager-link { color: var(--text); background: #fff; }
.pager-disabled { color: var(--muted); background: #f5f7fb; }
.modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.38);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 12px;
    z-index: 50;
}
.modal-card {
    width: min(680px, 100%);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
}
.modal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}
.modal-grid {
    display: grid;
    gap: 10px;
}
.modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 10px;
}
.status-badge {
    display: inline-block;
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
}
.status-new { background: #eaf2ff; color: #1d4ed8; }
.status-in_progress { background: #fff4e5; color: #b54708; }
.status-completed { background: #dcfce7; color: #166534; }
.status-canceled { background: #fee2e2; color: #991b1b; }
@media (max-width: 900px) {
    .toolbar {
        display: grid;
        grid-template-columns: 1fr;
    }
}
</style>
{% endblock %}
